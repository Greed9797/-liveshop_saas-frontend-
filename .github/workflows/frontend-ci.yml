name: Frontend CI

on:
  push:
    branches: [master, feat-ui-ux-architecture-v2]
  pull_request:
    branches: [master, feat-ui-ux-architecture-v2]

jobs:
  analyze-and-build:
    name: Analyze + Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.41
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fail on errors only)
        run: |
          # Falha em errors mas não em info/warning
          flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Build web release
        run: |
          flutter build web --release \
            --dart-define=API_URL=https://liveshop-saas-api-production.up.railway.app/v1
